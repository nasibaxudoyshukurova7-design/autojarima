<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish – AutoJarima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a56db 0%, #0c2d78 100%); min-height: 100vh; display: flex; align-items: center; padding: 2rem 0; }
        .reg-card { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #1a56db, #1035a0); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card reg-card p-4">
                <div class="text-center mb-3">
                    <div class="brand-icon"><i class="fas fa-car-side fa-2x text-white"></i></div>
                    <h4 class="fw-bold">AutoJarima</h4>
                    <p class="text-muted">Yangi hisob yaratish</p>
                </div>
                {% if form.non_field_errors %}
                <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Ism</label>
                            <input type="text" name="first_name" class="form-control" value="{{ form.first_name.value|default:'' }}" required>
                            {% if form.first_name.errors %}<div class="text-danger small">{{ form.first_name.errors }}</div>{% endif %}
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Familiya</label>
                            <input type="text" name="last_name" class="form-control" value="{{ form.last_name.value|default:'' }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ form.email.value|default:'' }}" required>
                        {% if form.email.errors %}<div class="text-danger small">{{ form.email.errors }}</div>{% endif %}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Telefon <span class="text-muted">(ixtiyoriy)</span></label>
                        <input type="text" name="phone" class="form-control" placeholder="+998 90 123 45 67" value="{{ form.phone.value|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Parol</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Parolni tasdiqlang</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="fas fa-user-plus me-2"></i>Ro'yxatdan o'tish
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <span class="text-muted">Hisobingiz bormi?</span>
                    <a href="{% url 'login' %}" class="fw-semibold ms-1">Kirish</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
