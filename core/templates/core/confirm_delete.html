{% extends 'core/base.html' %}
{% block title %}O'chirishni tasdiqlash{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card border-danger">
    <div class="card-header bg-danger text-white"><i class="fas fa-exclamation-triangle me-2"></i>O'chirishni tasdiqlash</div>
    <div class="card-body text-center py-4">
        <i class="fas fa-trash-alt fa-3x text-danger mb-3"></i>
        <p class="mb-1">Ushbu <strong>{{ type }}</strong>ni o'chirishni xohlaysizmi?</p>
        <p class="text-muted small mb-4">{{ obj }}</p>
        <form method="post" class="d-flex gap-2 justify-content-center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4"><i class="fas fa-trash me-1"></i>Ha, o'chirish</button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Bekor qilish</a>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
