{% extends 'core/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7 col-lg-5">
<div class="card">
    <div class="card-header bg-primary text-white"><i class="fas fa-car me-2"></i>{{ title }}</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Davlat raqami</label>
                {{ form.plate }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Marka / Model</label>
                {{ form.brand }}
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Yili</label>
                    {{ form.year }}
                </div>
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Rang</label>
                    {{ form.color }}
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-fill"><i class="fas fa-save me-1"></i>Saqlash</button>
                <a href="{% url 'car_list' %}" class="btn btn-outline-secondary">Bekor qilish</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
