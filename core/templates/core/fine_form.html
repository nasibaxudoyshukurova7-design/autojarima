{% extends 'core/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-8 col-lg-7">
<div class="card">
    <div class="card-header bg-danger text-white"><i class="fas fa-receipt me-2"></i>{{ title }}</div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Avtomobil</label>
                {{ form.car }}
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Jarima miqdori (so'm)</label>
                    {{ form.amount }}
                </div>
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Holati</label>
                    {{ form.status }}
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Jarima sababi</label>
                {{ form.reason }}
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Jarima sanasi</label>
                    {{ form.fine_date }}
                </div>
                <div class="col mb-3">
                    <label class="form-label fw-semibold">To'lov muddati</label>
                    {{ form.due_date }}
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Rasm / Hujjat <span class="text-muted">(ixtiyoriy)</span></label>
                {{ form.image }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Izoh</label>
                {{ form.note }}
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger flex-fill"><i class="fas fa-save me-1"></i>Saqlash</button>
                <a href="{% url 'fine_list' %}" class="btn btn-outline-secondary">Bekor qilish</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
