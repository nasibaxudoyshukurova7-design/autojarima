{% extends 'core/base.html' %}
{% block title %}Profil{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7 col-lg-5">
<div class="card">
    <div class="card-header bg-primary text-white"><i class="fas fa-user me-2"></i>Mening profilim</div>
    <div class="card-body">
        <div class="text-center mb-4">
            <div style="width:80px;height:80px;background:#1a56db;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                <i class="fas fa-user fa-2x text-white"></i>
            </div>
            <h5 class="fw-bold">{{ user.get_full_name }}</h5>
            <p class="text-muted">{{ user.email }}</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Ism</label>
                    <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                </div>
                <div class="col mb-3">
                    <label class="form-label fw-semibold">Familiya</label>
                    <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control" value="{{ user.email }}" disabled>
                <div class="form-text">Email o'zgartirib bo'lmaydi</div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Telefon</label>
                <input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
            </div>
            <hr>
            <div class="mb-3">
                <label class="form-label fw-semibold">Yangi parol <span class="text-muted">(ixtiyoriy)</span></label>
                <input type="password" name="new_password" class="form-control" placeholder="Bo'sh qoldiring – o'zgarmaydi">
            </div>
            <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-1"></i>Saqlash</button>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
